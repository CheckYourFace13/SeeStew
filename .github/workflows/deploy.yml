name: Deploy

# Validates every push to main, then triggers Hostinger when HOSTINGER_WEBHOOK_URL is set.
# Hostinger Git auto-deploy also runs on push if the GitHub webhook is connected in hPanel.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate articles
        run: npm run validate:articles

      - name: Check story images
        run: npm run check:story-images

      - name: Check ads.txt
        run: npm run check:ads-txt

      - name: Check source links resolve
        run: npm run check:source-links

      - name: Production build
        run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Hostinger deploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "HOSTINGER_WEBHOOK_URL not set — relying on Hostinger Git auto-deploy from push."
            exit 0
          fi
          HTTP_STATUS=$(curl -sS -o /tmp/hostinger-deploy.txt -w "%{http_code}" -X POST "$WEBHOOK_URL")
          echo "Hostinger webhook HTTP $HTTP_STATUS"
          cat /tmp/hostinger-deploy.txt || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Hostinger deploy webhook failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Hostinger deploy triggered."
