name: Daily Story Generator

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Validate story queue
        run: npm run validate:queue

      - name: Generate daily story
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: node scripts/generate-daily-story.mjs

      - name: Download story card image
        run: node scripts/fetch-all-story-images.mjs

      - name: Validate new article
        run: npm run validate:articles

      - name: Check story images
        run: npm run check:story-images

      - name: Commit article, images, and queue
        run: |
          git config user.name "SeeStew Bot"
          git config user.email "bot@seestew.com"
          git add content/articles/ content/story-queue.json public/stories/
          if git diff --cached --quiet; then
            echo "::error::No story file, image, or queue update was created."
            exit 1
          fi
          TITLE=$(node -e "const {readdirSync,readFileSync}=require('fs');const files=readdirSync('content/articles').filter(f=>f.endsWith('.json')).sort();const latest=files[files.length-1];const a=JSON.parse(readFileSync('content/articles/'+latest,'utf8'));process.stdout.write(a.title||latest);")
          git commit -m "feat(stories): add $(echo "$TITLE" | head -c 72)"
          git push
